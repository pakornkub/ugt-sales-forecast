# SonarQube configuration for UGT Sales Forecast
sonar.projectKey=ugt-sales-forecast
sonar.projectName=UGT Sales Forecast
sonar.projectVersion=1.0

sonar.sources=src
sonar.sourceEncoding=UTF-8
sonar.typescript.tsconfigPath=tsconfig.json

sonar.exclusions=\
  **/node_modules/**,\
  dist/**,\
  coverage/**,\
  dc-report/**,\
  prisma/migrations/**,\
  **/*.d.ts,\
  **/*.config.*,\
  server.js

sonar.coverage.exclusions=\
  src/db/seed.ts

# These UI/import modules intentionally contain repeated table markup and parser
# shapes for different preview sections. Refactoring them into a generic schema
# would add casts/config indirection without improving runtime behavior.
sonar.cpd.exclusions=\
  src/App.tsx,\
  src/components/forecast/ForecastInputTable.tsx,\
  src/components/forecast/ScrollableMonthGrid.tsx,\
  src/components/overplan/*.tsx,\
  src/api/services/forecastImport/*.ts

# Server/API catch blocks log operational failures for Jenkins and container
# diagnostics. Keep these logs while excluding the console rule from those files.
sonar.issue.ignore.multicriteria=s106api,s106server,s106seed,s6479ui,s3776import,s3776overplan,s3776approles,s3776forecastui,s2004app,s3358legacyui,s6848sfselect,s6819sfselect,s1082sfselect
sonar.issue.ignore.multicriteria.s106api.ruleKey=typescript:S106
sonar.issue.ignore.multicriteria.s106api.resourceKey=src/api/**/*.ts
sonar.issue.ignore.multicriteria.s106server.ruleKey=typescript:S106
sonar.issue.ignore.multicriteria.s106server.resourceKey=src/server.ts
sonar.issue.ignore.multicriteria.s106seed.ruleKey=typescript:S106
sonar.issue.ignore.multicriteria.s106seed.resourceKey=src/db/seed.ts
sonar.issue.ignore.multicriteria.s6479ui.ruleKey=typescript:S6479
sonar.issue.ignore.multicriteria.s6479ui.resourceKey=src/components/**/*.tsx
sonar.issue.ignore.multicriteria.s3776import.ruleKey=typescript:S3776
sonar.issue.ignore.multicriteria.s3776import.resourceKey=src/api/services/forecastImport/*.ts
sonar.issue.ignore.multicriteria.s3776overplan.ruleKey=typescript:S3776
sonar.issue.ignore.multicriteria.s3776overplan.resourceKey=src/api/services/overplan*.ts
sonar.issue.ignore.multicriteria.s3776approles.ruleKey=typescript:S3776
sonar.issue.ignore.multicriteria.s3776approles.resourceKey=src/api/services/appRoles.ts
sonar.issue.ignore.multicriteria.s3776forecastui.ruleKey=typescript:S3776
sonar.issue.ignore.multicriteria.s3776forecastui.resourceKey=src/components/forecast/ForecastInputTable.tsx
sonar.issue.ignore.multicriteria.s2004app.ruleKey=typescript:S2004
sonar.issue.ignore.multicriteria.s2004app.resourceKey=src/App.tsx
sonar.issue.ignore.multicriteria.s3358legacyui.ruleKey=typescript:S3358
sonar.issue.ignore.multicriteria.s3358legacyui.resourceKey=src/components/**/*.tsx
sonar.issue.ignore.multicriteria.s6848sfselect.ruleKey=typescript:S6848
sonar.issue.ignore.multicriteria.s6848sfselect.resourceKey=src/components/ui/SfSelect.tsx
sonar.issue.ignore.multicriteria.s6819sfselect.ruleKey=typescript:S6819
sonar.issue.ignore.multicriteria.s6819sfselect.resourceKey=src/components/ui/SfSelect.tsx
sonar.issue.ignore.multicriteria.s1082sfselect.ruleKey=typescript:S1082
sonar.issue.ignore.multicriteria.s1082sfselect.resourceKey=src/components/ui/SfSelect.tsx

# OWASP Dependency-Check reports are generated before SonarQube analysis.
sonar.dependencyCheck.jsonReportPath=dc-report/dependency-check-report.json
sonar.dependencyCheck.htmlReportPath=dc-report/dependency-check-report.html
sonar.dependencyCheck.severity.high=7.0
sonar.dependencyCheck.severity.medium=4.0
sonar.dependencyCheck.severity.low=0.0
