services:
  sales-forecast:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        APP_BASE_PATH: ${APP_BASE_PATH:-/ugt-sales-forecast/nylon}
        APP_BASE_URL: ${APP_BASE_URL:-https://ugtweb.ube.co.th}
    image: ${IMAGE_NAME:-ugt-sales-forecast}:${IMAGE_TAG:-latest}
    container_name: ${CONTAINER_NAME:-ugt-sales-forecast}
    init: true
    restart: unless-stopped
    stop_grace_period: 30s
    env_file:
      - .env
    environment:
      NODE_ENV: production
      API_PORT: 3001
    ports:
      - "${HOST_PORT:-3000}:3001"
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - "fetch('http://127.0.0.1:3001' + (process.env.APP_BASE_PATH || '') + '/healthz').then(r => { if (!r.ok) process.exit(1) }).catch(() => process.exit(1))"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s
